name: 🛍️ Bot Rainha da Shopee

on:
  workflow_dispatch:          # Permite o disparo manual e via Google Script
  schedule:
    - cron: '0 */4 * * *'    # Também roda automaticamente a cada 4 horas

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências Python
        run: pip install -r requirements.txt

      - name: 🌐 Instalar Playwright + Chromium (Rápido)
        id: playwright_fast
        continue-on-error: true
        run: python -m playwright install chromium

      - name: 🌐 Instalar Playwright + Chromium (Lento - Fallback)
        if: steps.playwright_fast.outcome == 'failure'
        run: python -m playwright install --with-deps chromium

      - name: 🎥 Instalar FFmpeg (Rápido)
        id: ffmpeg_fast
        continue-on-error: true
        uses: AnimMouse/setup-ffmpeg@v1

      - name: 🎥 Instalar FFmpeg (Lento - Fallback)
        if: steps.ffmpeg_fast.outcome == 'failure'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: 🛍️ Rodar Bot Rainha da Shopee
        env:
          SFY_EMAIL:      ${{ secrets.SFY_EMAIL }}
          SFY_PASSWORD:   ${{ secrets.SFY_PASSWORD }}
          FB_PAGE_ID:     ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN:       ${{ secrets.FB_TOKEN }}
          FB_APP_ID:      ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:  ${{ secrets.FB_APP_SECRET }}
          FB_USER_TOKEN:  ${{ secrets.FB_USER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: 💾 Salvar estado de posts publicados + links exportados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.json last_title.txt links_noticias.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ Nenhuma mudança de estado para salvar."
          else
            git commit -m "chore: atualizar estado do bot + links exportados [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "✅ Estado e links_noticias.json enviados para o GitHub!"
          fi
